name: CI

on:
  push:
    branches: [ main, week2 ]
  pull_request:
    branches: [ main, week2 ]

jobs:
  # ── Job 1: Run tests ───────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: backend
        run: mvn test -q

      - name: Upload Surefire report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: backend/target/surefire-reports/

  # ── Job 2: Build jar + Docker image ───────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package jar
        working-directory: backend
        run: mvn package -DskipTests -q

      - name: Docker build
        run: docker build -t hospital-order-system:ci .

  # ── Job 3: Deploy to Render (main branch → Week 1 service) ────────────────
  deploy-main:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy (Week 1)
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  # ── Job 4: Deploy to Render (week2 branch → Week 2 service) ───────────────
  deploy-week2:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/week2' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy (Week 2)
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WEEK2 }}"
